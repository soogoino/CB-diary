name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build Signed APK & Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for git describe

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── Extract version info from build.gradle.kts ─────────────────────────
      - name: Extract version info
        id: version
        run: |
          VERSION_CODE=$(grep -m1 'versionCode\s*=' app/build.gradle.kts | grep -oP '\d+')
          VERSION_NAME=$(grep -m1 'versionName\s*=' app/build.gradle.kts | grep -oP '["'"'"']\K[^"'"'"']+')
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            echo "VERSION_NAME=${TAG_VERSION}" >> $GITHUB_OUTPUT
            echo "IS_TAG=true" >> $GITHUB_OUTPUT
          else
            echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_OUTPUT
            echo "IS_TAG=false" >> $GITHUB_OUTPUT
          fi
          echo "VERSION_CODE=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "APK_NAME=ChastityDiary-${VERSION_NAME:-$VERSION_CODE}" >> $GITHUB_OUTPUT

      # ── Decode & validate keystore ─────────────────────────────────────────
      - name: Decode keystore
        run: |
          printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/cb-diary-release.jks
          # Fail fast if the keystore cannot be read with the provided password
          keytool -list \
            -keystore /tmp/cb-diary-release.jks \
            -storepass "${{ secrets.KEYSTORE_PASS }}" \
            -noprompt
          echo "Keystore OK"

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build release APK
        env:
          KEYSTORE_PATH: /tmp/cb-diary-release.jks
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS:     ${{ secrets.KEY_ALIAS }}
          KEY_PASS:      ${{ secrets.KEY_PASS }}
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --build-cache \
            -Dorg.gradle.parallel=true

      # ── Rename APK ─────────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          APK_SRC="app/build/outputs/apk/release/app-release.apk"
          APK_DST="app/build/outputs/apk/release/${{ steps.version.outputs.APK_NAME }}.apk"
          mv "$APK_SRC" "$APK_DST"
          echo "APK_PATH=${APK_DST}" >> $GITHUB_ENV

      # ── Read changelog ─────────────────────────────────────────────────────
      - name: Read changelog
        id: changelog
        if: steps.version.outputs.IS_TAG == 'true'
        run: |
          VER="${{ steps.version.outputs.VERSION_NAME }}"
          CODE="${{ steps.version.outputs.VERSION_CODE }}"
          # Try version name first (e.g. 1.1.0.txt), then version code (e.g. 6.txt)
          CHANGELOG_FILE=""
          for f in \
            "fastlane/metadata/android/en-US/changelogs/${VER}.txt" \
            "fastlane/metadata/android/en-US/changelogs/${CODE}.txt"; do
            if [[ -f "$f" ]]; then
              CHANGELOG_FILE="$f"
              break
            fi
          done
          if [[ -n "$CHANGELOG_FILE" ]]; then
            # Use a random delimiter to avoid collision with changelog content.
            # printf ensures a newline after the file content even if the file
            # has no trailing newline, so the closing delimiter is on its own line.
            DELIM="CHANGELOG_$(openssl rand -hex 8)"
            echo "BODY<<${DELIM}" >> "$GITHUB_OUTPUT"
            printf '%s\n' "$(cat "$CHANGELOG_FILE")" >> "$GITHUB_OUTPUT"
            echo "${DELIM}" >> "$GITHUB_OUTPUT"
          else
            echo "BODY=No changelog found for ${VER} (code ${CODE})." >> $GITHUB_OUTPUT
          fi

      # ── Upload artifact (manual trigger / no tag) ─────────────────────────
      - name: Upload APK artifact
        if: steps.version.outputs.IS_TAG == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 7

      # ── Create GitHub Release (tag push only) ──────────────────────────────
      - name: Create GitHub Release
        if: steps.version.outputs.IS_TAG == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: "Chastity Diary ${{ github.ref_name }}"
          body: |
            ## What's new in ${{ github.ref_name }}

            ${{ steps.changelog.outputs.BODY }}

            ---
            ### Install
            Download the APK below and sideload on Android 7.0+ (minSdk 24).
            You may need to enable **Install from unknown sources** in Settings.
          files: ${{ env.APK_PATH }}
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
